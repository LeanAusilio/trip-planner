<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Travel app background – dark mode</title>
  <desc>Minimalist travel background with dark base, muted route lines and pulsing destination dots</desc>

  <defs>
    <radialGradient id="d1g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b7380" stop-opacity="0.8"/>
      <stop offset="45%" stop-color="#6b7380" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6b7380" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="d2g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8a9198" stop-opacity="0.7"/>
      <stop offset="45%" stop-color="#8a9198" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8a9198" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="d3g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#50585f" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#50585f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#50585f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .pulse-ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse 3s ease-out infinite;
    }
    .pulse-ring.d1 { animation-delay: 0s; }
    .pulse-ring.d2 { animation-delay: 0.7s; }
    .pulse-ring.d3 { animation-delay: 1.4s; }
    .pulse-ring.d4 { animation-delay: 2.1s; }
    .pulse-ring.d5 { animation-delay: 0.35s; }
    .pulse-ring.d6 { animation-delay: 1.05s; }
    .pulse-ring.d7 { animation-delay: 1.75s; }
    .pulse-ring.d8 { animation-delay: 2.45s; }

    @keyframes pulse {
      0%   { r: 6px;  opacity: 0.6; }
      60%  { r: 22px; opacity: 0.18; }
      100% { r: 28px; opacity: 0; }
    }

    .dot-glow {
      transform-box: fill-box;
      transform-origin: center;
      animation: glow 3s ease-in-out infinite;
    }
    .dot-glow.d1 { animation-delay: 0s; }
    .dot-glow.d2 { animation-delay: 0.7s; }
    .dot-glow.d3 { animation-delay: 1.4s; }
    .dot-glow.d4 { animation-delay: 2.1s; }
    .dot-glow.d5 { animation-delay: 0.35s; }
    .dot-glow.d6 { animation-delay: 1.05s; }
    .dot-glow.d7 { animation-delay: 1.75s; }
    .dot-glow.d8 { animation-delay: 2.45s; }

    @keyframes glow {
      0%   { opacity: 0.5; }
      50%  { opacity: 0.9; }
      100% { opacity: 0.5; }
    }
  </style>

  <rect width="680" height="420" fill="#0f1623"/>

  <path d="M-10 320 Q80 290 160 300 Q240 310 300 270 Q360 230 440 240 Q520 250 600 210 Q640 190 700 200" fill="none" stroke="#2a3340" stroke-width="1.2" opacity="0.9"/>
  <path d="M-10 180 Q60 160 140 170 Q220 180 280 150 Q340 120 420 130 Q500 140 570 100 Q620 75 700 90" fill="none" stroke="#222c38" stroke-width="1" opacity="0.85"/>
  <path d="M-10 380 Q100 360 200 370 Q300 380 380 340 Q460 300 540 320 Q610 335 700 310" fill="none" stroke="#1e2830" stroke-width="0.9" opacity="0.8"/>
  <path d="M-10 60 Q90 50 180 65 Q260 80 340 55 Q420 30 510 45 Q590 58 700 40" fill="none" stroke="#1c2530" stroke-width="0.8" opacity="0.7"/>
  <path d="M-10 250 Q70 235 150 245 Q230 255 310 225 Q390 195 470 210 Q555 225 640 190 Q665 180 700 185" fill="none" stroke="#263040" stroke-width="1" opacity="0.85"/>
  <path d="M-10 120 Q120 105 200 115 Q290 125 370 95 Q450 65 540 80 Q610 90 700 70" fill="none" stroke="#1e2830" stroke-width="0.8" opacity="0.7"/>

  <circle class="pulse-ring d1" cx="160" cy="300" r="6" fill="none" stroke="#6b7380" stroke-width="1"/>
  <circle cx="160" cy="300" r="12" fill="url(#d1g)" opacity="0.55"/>
  <circle class="dot-glow d1" cx="160" cy="300" r="4" fill="#9aa2ae"/>

  <circle class="pulse-ring d2" cx="300" cy="270" r="6" fill="none" stroke="#50585f" stroke-width="1"/>
  <circle cx="300" cy="270" r="14" fill="url(#d3g)" opacity="0.5"/>
  <circle class="dot-glow d2" cx="300" cy="270" r="4.5" fill="#7a8290"/>

  <circle class="pulse-ring d3" cx="440" cy="240" r="6" fill="none" stroke="#8a9198" stroke-width="1"/>
  <circle cx="440" cy="240" r="11" fill="url(#d2g)" opacity="0.5"/>
  <circle class="dot-glow d3" cx="440" cy="240" r="3.5" fill="#b0b8c0"/>

  <circle class="pulse-ring d4" cx="600" cy="210" r="6" fill="none" stroke="#6b7380" stroke-width="1"/>
  <circle cx="600" cy="210" r="13" fill="url(#d1g)" opacity="0.55"/>
  <circle class="dot-glow d4" cx="600" cy="210" r="4" fill="#9aa2ae"/>

  <circle class="pulse-ring d5" cx="140" cy="170" r="6" fill="none" stroke="#8a9198" stroke-width="0.8"/>
  <circle cx="140" cy="170" r="8" fill="url(#d2g)" opacity="0.45"/>
  <circle class="dot-glow d5" cx="140" cy="170" r="3" fill="#a0a8b0"/>

  <circle class="pulse-ring d6" cx="280" cy="150" r="6" fill="none" stroke="#50585f" stroke-width="0.8"/>
  <circle cx="280" cy="150" r="7" fill="url(#d3g)" opacity="0.42"/>
  <circle class="dot-glow d6" cx="280" cy="150" r="3" fill="#888e98"/>

  <circle class="pulse-ring d7" cx="420" cy="130" r="6" fill="none" stroke="#6b7380" stroke-width="0.8"/>
  <circle cx="420" cy="130" r="9" fill="url(#d1g)" opacity="0.45"/>
  <circle class="dot-glow d7" cx="420" cy="130" r="3.5" fill="#9aa2ae"/>

  <circle class="pulse-ring d8" cx="570" cy="100" r="6" fill="none" stroke="#8a9198" stroke-width="0.8"/>
  <circle cx="570" cy="100" r="7" fill="url(#d2g)" opacity="0.4"/>
  <circle class="dot-glow d8" cx="570" cy="100" r="3" fill="#a0a8b0"/>

  <circle cx="200" cy="370" r="10" fill="url(#d1g)" opacity="0.25"/>
  <circle cx="200" cy="370" r="3" fill="#6a7280" opacity="0.55"/>
  <circle cx="380" cy="340" r="9" fill="url(#d2g)" opacity="0.22"/>
  <circle cx="380" cy="340" r="2.5" fill="#7a8090" opacity="0.5"/>
  <circle cx="540" cy="320" r="9" fill="url(#d3g)" opacity="0.2"/>
  <circle cx="540" cy="320" r="3" fill="#6a7280" opacity="0.5"/>
</svg>
