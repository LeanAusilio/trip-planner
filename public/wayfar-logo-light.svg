<svg width="400" viewBox="0 0 400 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Wayfar logo – light mode</title>
  <desc>Minimalist travel logo with route lines, pulsing destination dots, and a glowing chevron arrow</desc>

  <style>
    .pulse-ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: sonar 2.8s ease-out infinite;
    }
    .p1 { animation-delay: 0s; }
    .p2 { animation-delay: 0.9s; }
    @keyframes sonar {
      0%   { r: 7px; opacity: 0.55; }
      70%  { r: 20px; opacity: 0.08; }
      100% { r: 24px; opacity: 0; }
    }
    .dot-breathe {
      transform-box: fill-box;
      transform-origin: center;
      animation: breathe 2.8s ease-in-out infinite;
    }
    .b1 { animation-delay: 0s; }
    .b2 { animation-delay: 0.9s; }
    @keyframes breathe {
      0%,100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }
    .arrow-glow {
      animation: arrowpulse 2.8s ease-in-out infinite;
      animation-delay: 0.9s;
    }
    @keyframes arrowpulse {
      0%,100% { opacity: 0.45; }
      50%      { opacity: 1; }
    }
  </style>

  <defs>
    <radialGradient id="gl1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8a9098" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#8a9098" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gl2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6a7280" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6a7280" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="garrow" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#7ab0d4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7ab0d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="280" fill="#ffffff"/>

  <path d="M 30 195 Q 90 180 138 185 Q 186 190 218 167 Q 242 150 268 153" fill="none" stroke="#c8cdd6" stroke-width="1.2"/>
  <path d="M 30 213 Q 95 200 148 204 Q 194 208 228 189 Q 250 177 278 180" fill="none" stroke="#dde0e6" stroke-width="0.8"/>

  <circle class="pulse-ring p1" cx="138" cy="185" r="7" fill="none" stroke="#9aa0aa" stroke-width="0.9"/>
  <circle cx="138" cy="185" r="12" fill="url(#gl1)" opacity="0.5"/>
  <circle class="dot-breathe b1" cx="138" cy="185" r="3.5" fill="#7a8290"/>

  <circle class="pulse-ring p2" cx="218" cy="167" r="7" fill="none" stroke="#78808c" stroke-width="1"/>
  <circle cx="218" cy="167" r="15" fill="url(#gl2)" opacity="0.48"/>
  <circle class="dot-breathe b2" cx="218" cy="167" r="5" fill="#5a6270"/>

  <ellipse class="arrow-glow" cx="262" cy="167" rx="22" ry="14" fill="url(#garrow)"/>
  <path d="M 236 159 L 264 167 L 236 175" fill="none" stroke="#7ab0d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="223" y1="167" x2="236" y2="167" stroke="#b0bcc8" stroke-width="1" stroke-linecap="round"/>

  <text x="30" y="242" font-family="system-ui, sans-serif" font-size="22" font-weight="300" letter-spacing="6" fill="#3a4050">wayfar</text>
</svg>
