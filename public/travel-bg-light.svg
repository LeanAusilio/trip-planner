<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Travel app background – light mode</title>
  <desc>Minimalist travel background with white base, grey route lines and pulsing destination dots</desc>

  <defs>
    <radialGradient id="h1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9aa0aa" stop-opacity="0.7"/>
      <stop offset="45%" stop-color="#9aa0aa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9aa0aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="h2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8bcc4" stop-opacity="0.65"/>
      <stop offset="45%" stop-color="#b8bcc4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#b8bcc4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="h3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#78808c" stop-opacity="0.75"/>
      <stop offset="45%" stop-color="#78808c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#78808c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .pulse-ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse 3s ease-out infinite;
    }
    .pulse-ring.d1 { animation-delay: 0s; }
    .pulse-ring.d2 { animation-delay: 0.7s; }
    .pulse-ring.d3 { animation-delay: 1.4s; }
    .pulse-ring.d4 { animation-delay: 2.1s; }
    .pulse-ring.d5 { animation-delay: 0.35s; }
    .pulse-ring.d6 { animation-delay: 1.05s; }
    .pulse-ring.d7 { animation-delay: 1.75s; }
    .pulse-ring.d8 { animation-delay: 2.45s; }

    @keyframes pulse {
      0%   { r: 6px;  opacity: 0.55; }
      60%  { r: 22px; opacity: 0.15; }
      100% { r: 28px; opacity: 0; }
    }

    .dot-glow {
      transform-box: fill-box;
      transform-origin: center;
      animation: glow 3s ease-in-out infinite;
    }
    .dot-glow.d1 { animation-delay: 0s; }
    .dot-glow.d2 { animation-delay: 0.7s; }
    .dot-glow.d3 { animation-delay: 1.4s; }
    .dot-glow.d4 { animation-delay: 2.1s; }
    .dot-glow.d5 { animation-delay: 0.35s; }
    .dot-glow.d6 { animation-delay: 1.05s; }
    .dot-glow.d7 { animation-delay: 1.75s; }
    .dot-glow.d8 { animation-delay: 2.45s; }

    @keyframes glow {
      0%   { opacity: 0.6; }
      50%  { opacity: 1;   }
      100% { opacity: 0.6; }
    }
  </style>

  <rect width="680" height="420" fill="#ffffff"/>

  <path d="M-10 320 L160 300 L300 270 L440 240 L600 210 L700 200" fill="none" stroke="#c8cdd6" stroke-width="1.2" opacity="0.9"/>
  <path d="M-10 180 L140 170 L280 150 L420 130 L570 100 L700 90" fill="none" stroke="#d8dbe2" stroke-width="1" opacity="0.85"/>
  <path d="M-10 380 L200 370 L380 340 L540 320 L700 310" fill="none" stroke="#dde0e6" stroke-width="0.9" opacity="0.75"/>
  <path d="M-10 60 L180 65 L340 55 L510 45 L700 40" fill="none" stroke="#e2e5ea" stroke-width="0.8" opacity="0.7"/>
  <path d="M-10 250 L150 245 L310 225 L470 210 L640 190 L700 185" fill="none" stroke="#cdd1d9" stroke-width="1" opacity="0.8"/>
  <path d="M-10 120 L200 115 L370 95 L540 80 L700 70" fill="none" stroke="#e0e3e8" stroke-width="0.8" opacity="0.65"/>

  <circle class="pulse-ring d1" cx="160" cy="300" r="6" fill="none" stroke="#9aa0aa" stroke-width="1"/>
  <circle cx="160" cy="300" r="12" fill="url(#h1)" opacity="0.5"/>
  <circle class="dot-glow d1" cx="160" cy="300" r="4" fill="#7a8290"/>

  <circle class="pulse-ring d2" cx="300" cy="270" r="6" fill="none" stroke="#78808c" stroke-width="1"/>
  <circle cx="300" cy="270" r="14" fill="url(#h3)" opacity="0.45"/>
  <circle class="dot-glow d2" cx="300" cy="270" r="4.5" fill="#5a6270"/>

  <circle class="pulse-ring d3" cx="440" cy="240" r="6" fill="none" stroke="#b8bcc4" stroke-width="1"/>
  <circle cx="440" cy="240" r="11" fill="url(#h2)" opacity="0.5"/>
  <circle class="dot-glow d3" cx="440" cy="240" r="3.5" fill="#8a9098"/>

  <circle class="pulse-ring d4" cx="600" cy="210" r="6" fill="none" stroke="#9aa0aa" stroke-width="1"/>
  <circle cx="600" cy="210" r="13" fill="url(#h1)" opacity="0.5"/>
  <circle class="dot-glow d4" cx="600" cy="210" r="4" fill="#7a8290"/>

  <circle class="pulse-ring d5" cx="140" cy="170" r="6" fill="none" stroke="#b8bcc4" stroke-width="0.8"/>
  <circle cx="140" cy="170" r="8" fill="url(#h2)" opacity="0.45"/>
  <circle class="dot-glow d5" cx="140" cy="170" r="3" fill="#9aa2ae"/>

  <circle class="pulse-ring d6" cx="280" cy="150" r="6" fill="none" stroke="#78808c" stroke-width="0.8"/>
  <circle cx="280" cy="150" r="7" fill="url(#h3)" opacity="0.4"/>
  <circle class="dot-glow d6" cx="280" cy="150" r="3" fill="#6a7280"/>

  <circle class="pulse-ring d7" cx="420" cy="130" r="6" fill="none" stroke="#9aa0aa" stroke-width="0.8"/>
  <circle cx="420" cy="130" r="9" fill="url(#h1)" opacity="0.42"/>
  <circle class="dot-glow d7" cx="420" cy="130" r="3.5" fill="#8a9098"/>

  <circle class="pulse-ring d8" cx="570" cy="100" r="6" fill="none" stroke="#b8bcc4" stroke-width="0.8"/>
  <circle cx="570" cy="100" r="7" fill="url(#h2)" opacity="0.4"/>
  <circle class="dot-glow d8" cx="570" cy="100" r="3" fill="#9aa2ae"/>

  <circle cx="200" cy="370" r="10" fill="url(#h1)" opacity="0.22"/>
  <circle cx="200" cy="370" r="3" fill="#aab0b8" opacity="0.5"/>
  <circle cx="380" cy="340" r="9" fill="url(#h2)" opacity="0.2"/>
  <circle cx="380" cy="340" r="2.5" fill="#b0b6be" opacity="0.45"/>
  <circle cx="540" cy="320" r="9" fill="url(#h3)" opacity="0.18"/>
  <circle cx="540" cy="320" r="3" fill="#9aa2ae" opacity="0.45"/>
</svg>
